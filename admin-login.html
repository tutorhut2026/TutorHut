<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin – TutorHut</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script>if(localStorage.theme==='dark'||(!localStorage.theme&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.dataset.theme='dark'</script>
</head>
<body>
  <div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="text-center">
      <span class="spinner-border text-primary" role="status"></span>
      <p class="mt-3 text-muted">Signing out…</p>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { auth, signOut } from "./js/firebase.js";
    try { await signOut(auth); } catch(e) {}
    window.location.replace("login.html?type=tutor");
  </script>
<script src="js/theme.js"></script>
</body>
</html>
